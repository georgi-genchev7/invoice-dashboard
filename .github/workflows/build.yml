name: Build Dashboard

on:
  schedule:
    - cron: "0 3 * * *"   # 06:00 Sofia
    - cron: "0 10 * * *"  # 13:00 Sofia
    - cron: "0 14 * * *"  # 17:00 Sofia
  workflow_dispatch:
  repository_dispatch:
    types: [data-updated]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up GCP credentials
        run: |
          echo '${{ secrets.GCP_CREDENTIALS }}' > /tmp/gcp-creds.json
          echo "CLOUDSDK_AUTH_CREDENTIAL_FILE_OVERRIDE=/tmp/gcp-creds.json" >> "$GITHUB_ENV"
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcp-creds.json" >> "$GITHUB_ENV"

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Build dashboard
        run: python scripts/build_dashboard.py

      - name: Upload to GCS
        run: |
          gsutil -h "Content-Type:text/html; charset=utf-8" \
                 -h "Cache-Control:no-cache, max-age=0" \
                 cp output/agent-fetch-dashboard.html gs://expense-automation-dashboards/agent-fetch-dashboard.html

      - name: Clean up credentials
        if: always()
        run: rm -f /tmp/gcp-creds.json
