name: Build Dashboard

on:
  schedule:
    - cron: "0 3 * * *"   # 06:00 Sofia
    - cron: "0 10 * * *"  # 13:00 Sofia
    - cron: "0 14 * * *"  # 17:00 Sofia
  workflow_dispatch:
  repository_dispatch:
    types: [data-updated]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Authenticate to GCP
        run: |
          echo '${{ secrets.GCP_CREDENTIALS }}' > /tmp/gcp-creds.json
          gcloud auth login --cred-file=/tmp/gcp-creds.json --quiet 2>/dev/null \
            || true
          gcloud config set auth/credential_file_override /tmp/gcp-creds.json
          echo "CLOUDSDK_AUTH_CREDENTIAL_FILE_OVERRIDE=/tmp/gcp-creds.json" >> "$GITHUB_ENV"
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcp-creds.json" >> "$GITHUB_ENV"

      - name: Build dashboard
        run: python scripts/build_dashboard.py

      - name: Upload to GCS
        run: |
          gcloud storage cp output/agent-fetch-dashboard.html \
            gs://expense-automation-dashboards/agent-fetch-dashboard.html \
            --content-type="text/html; charset=utf-8" \
            --cache-control="no-cache, max-age=0"

      - name: Clean up credentials
        if: always()
        run: rm -f /tmp/gcp-creds.json
